name: Validate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: yarn install --immutable

      - name: Lint
        id: lint
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: yarn lint

      - name: Typecheck
        id: typecheck
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: yarn typecheck

      - name: Unit Tests
        id: tests
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: yarn test

      - name: Build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: yarn build

      # ─── Smoke Tests ────────────────────────────────────────────────
      # Quick sanity checks that the built package actually works.
      # Only run when build succeeded (need dist/ artifacts).

      - name: Smoke tests
        id: smoke
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          echo "── Checking build artifacts..."
          test -f dist/index.js   || { echo "FAIL: dist/index.js missing"; exit 1; }
          test -f dist/cli.js     || { echo "FAIL: dist/cli.js missing"; exit 1; }
          test -f dist/index.d.ts || { echo "FAIL: dist/index.d.ts missing"; exit 1; }
          echo "✓ All build artifacts present."

          echo ""
          echo "── CLI --help smoke test..."
          node dist/cli.js --help
          echo "✓ CLI runs."

          echo ""
          echo "── Library import smoke test..."
          node --input-type=module <<'SMOKE'
          import { setSelfRepairOptions, registerCrashHandler, startSelfRepair } from './dist/index.js'

          const exports = { setSelfRepairOptions, registerCrashHandler, startSelfRepair }
          for (const [name, fn] of Object.entries(exports)) {
            if (typeof fn !== 'function') {
              console.error(`FAIL: ${name} is ${typeof fn}, expected function`)
              process.exit(1)
            }
            console.log(`✓ ${name} is a function`)
          }

          const resolved = setSelfRepairOptions({ engine: 'claude', repo: 'test/repo' })
          if (resolved.engine !== 'claude' || resolved.repo !== 'test/repo') {
            console.error('FAIL: resolved options mismatch')
            process.exit(1)
          }
          console.log('✓ setSelfRepairOptions returns correct resolved options')

          if (resolved.runInProduction !== false || resolved.maxParallelRepairs !== 3) {
            console.error('FAIL: default values incorrect')
            process.exit(1)
          }
          console.log('✓ Default options applied correctly')
          SMOKE

          echo ""
          echo "── Checking skill files..."
          test -f .claude/skills/bug-report/SKILL.md || { echo "FAIL: bug-report skill missing"; exit 1; }
          test -f .claude/skills/repair/SKILL.md     || { echo "FAIL: repair skill missing"; exit 1; }
          test -f .claude/skills/make-pr/SKILL.md    || { echo "FAIL: make-pr skill missing"; exit 1; }
          echo "✓ All skill files present."

          echo ""
          echo "All smoke tests passed."

      # ─── End-to-End Test ──────────────────────────────────────────
      # Runs the full repair pipeline with a real Claude invocation.
      # Requires ANTHROPIC_API_KEY; skips gracefully when absent.
      # Only run on the main or develop branch

      - name: End-to-end test
        id: e2e
        if: ${{ steps.install.outcome == 'success' && (github.head_ref == 'main' || github.head_ref == 'develop') }}
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: yarn test:e2e

      - name: Test dashboard
        if: steps.tests.outcome == 'success' || steps.tests.outcome == 'failure'
        uses: test-summary/action@v2
        with:
          paths: test-results/junit.xml

      - name: Summary
        id: summary
        if: always()
        run: |
          echo ""
          echo "=============================="
          echo "       Validation Summary"
          echo "=============================="
          echo ""

          FAILED=0
          FAILURES=""

          if [ "${{ steps.install.outcome }}" != "success" ]; then
            echo -e "\033[31m✗ Install failed\033[0m"
            FAILURES="${FAILURES}Install failed. "
            FAILED=1
          fi

          if [ "${{ steps.lint.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Lint passed\033[0m"
          elif [ "${{ steps.lint.outcome }}" = "failure" ]; then
            echo -e "\033[31m✗ Lint failed\033[0m"
            FAILURES="${FAILURES}Lint failed. "
            FAILED=1
          fi

          if [ "${{ steps.typecheck.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Typecheck passed\033[0m"
          elif [ "${{ steps.typecheck.outcome }}" = "failure" ]; then
            echo -e "\033[31m✗ Typecheck failed\033[0m"
            FAILURES="${FAILURES}Typecheck failed. "
            FAILED=1
          fi

          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Unit tests passed\033[0m"
          elif [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo -e "\033[31m✗ Unit tests failed\033[0m"
            FAILURES="${FAILURES}Unit tests failed. "
            FAILED=1
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Build passed\033[0m"
          elif [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo -e "\033[31m✗ Build failed\033[0m"
            FAILURES="${FAILURES}Build failed. "
            FAILED=1
          fi

          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Smoke tests passed\033[0m"
          elif [ "${{ steps.smoke.outcome }}" = "failure" ]; then
            echo -e "\033[31m✗ Smoke tests failed\033[0m"
            FAILURES="${FAILURES}Smoke tests failed. "
            FAILED=1
          fi

          if [ "${{ steps.e2e.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ E2E test passed\033[0m"
          elif [ "${{ steps.e2e.outcome }}" = "failure" ]; then
            echo -e "\033[31m✗ E2E test failed\033[0m"
            FAILURES="${FAILURES}E2E test failed. "
            FAILED=1
          fi

          echo ""
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" = "1" ]; then
            echo -e "\033[31mOne or more validation steps failed.\033[0m"
          else
            echo -e "\033[32mAll validation steps passed.\033[0m"
          fi

      # ─── Self-Repair on failure ──────────────────────────────────────
      # If any validation step failed, invoke self-repair against our own
      # repo to diagnose the issue, file a bug report, and attempt a fix.
      #
      # Uses yarn tsx to run from source so self-repair works even when
      # the build step itself fails.
      #
      # Conditions:
      #   - failed == '1': boolean flag, not a count. '1' means one or more steps failed.
      #   - branch guard: only fires on main/develop (push) or PRs targeting main/develop.
      #     github.base_ref is set for PRs (target branch), github.ref_name for pushes.
      #   - branch not self-repair/*: prevents infinite loops where a self-repair PR
      #     triggers CI, fails, and invokes self-repair again endlessly.
      #
      # On PRs: passes --pr <number> so the fix is committed directly to the PR branch.
      # On pushes: creates a new issue + new PR (standard mode).
      #
      # Before invoking the agent, fetch-failed-logs.ts deterministically
      # retrieves the actual error output from the GitHub Actions API.
      # This runs as a script (not the LLM agent), using only native fetch
      # and GITHUB_TOKEN -- no gh CLI dependency.

      - name: Self-repair
        if: >-
          always()
          && steps.summary.outputs.failed == '1'
          && !startsWith(github.head_ref || github.ref_name, 'self-repair/')
          && (
            github.base_ref == 'main'
            || github.base_ref == 'develop'
            || github.ref_name == 'main'
            || github.ref_name == 'develop'
          )

        timeout-minutes: 15

        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.JL_FINE_GRAINED_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BRANCH: "${{ github.head_ref || github.ref_name }}"
          SHA: "${{ github.sha }}"
          FAILURES: "${{ steps.summary.outputs.failures }}"

        run: |
          # If the immutable install failed (e.g. lockfile mismatch), do a
          # permissive install so we have node_modules to run tsx from source.
          if [ "${{ steps.install.outcome }}" != "success" ]; then
            echo "Primary install failed -- running permissive install for self-repair..."
            yarn install --no-immutable
          else
            echo "Using existing node_modules from primary install."
          fi

          # Fetch the actual error output from failed CI steps via GitHub API.
          # This runs deterministically before the agent -- no LLM turns wasted.
          #
          # The --steps flag passes raw step outcomes from the workflow context
          # (before continue-on-error is applied). This is necessary because the
          # REST API only exposes `conclusion` which is always 'success' for steps
          # with continue-on-error: true.
          echo -e "\033[35m[self-repair] Fetching failed step logs from GitHub API...\033[0m"
          STEP_OUTCOMES="Install dependencies:${{ steps.install.outcome }}"
          STEP_OUTCOMES="${STEP_OUTCOMES},Lint:${{ steps.lint.outcome }}"
          STEP_OUTCOMES="${STEP_OUTCOMES},Typecheck:${{ steps.typecheck.outcome }}"
          STEP_OUTCOMES="${STEP_OUTCOMES},Unit Tests:${{ steps.tests.outcome }}"
          STEP_OUTCOMES="${STEP_OUTCOMES},Build:${{ steps.build.outcome }}"
          STEP_OUTCOMES="${STEP_OUTCOMES},Smoke tests:${{ steps.smoke.outcome }}"
          STEP_OUTCOMES="${STEP_OUTCOMES},End-to-end test:${{ steps.e2e.outcome }}"
          STACK=$(yarn tsx src/ci/fetch-failed-logs.ts --steps "${STEP_OUTCOMES}" 2>/dev/null || echo "")

          ERROR_MESSAGE="CI validation failed on branch '${BRANCH}' (${SHA:0:7}). ${FAILURES}"

          echo ""
          echo -e "\033[35m[self-repair] Initiating self-repair for CI failure...\033[0m"
          echo -e "\033[35m[self-repair] Error: ${ERROR_MESSAGE}\033[0m"
          if [ -n "$STACK" ]; then
            echo -e "\033[35m[self-repair] Error context captured ($(echo "$STACK" | wc -l) lines)\033[0m"
          fi
          echo ""

          # On PRs: commit fix directly to the PR branch via --pr
          # On pushes: create a new issue + PR (standard mode)
          PR_FLAG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_FLAG="--pr ${{ github.event.pull_request.number }}"
            echo -e "\033[35m[self-repair] PR mode: fixing PR #${{ github.event.pull_request.number }} in-place\033[0m"
          fi

          yarn tsx src/cli.ts \
            --error "${ERROR_MESSAGE}" \
            --stack "${STACK}" \
            --engine claude \
            --repo "${{ github.repository }}" \
            --verbose \
            $PR_FLAG
