name: Validate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        id: lint
        continue-on-error: true
        run: yarn lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: yarn typecheck

      - name: Unit Tests
        id: tests
        continue-on-error: true
        run: yarn test

      - name: Build
        id: build
        continue-on-error: true
        run: yarn build

      - name: Summary
        run: |
          echo ""
          echo "=============================="
          echo "       Validation Summary"
          echo "=============================="
          echo ""

          FAILED=0

          if [ "${{ steps.lint.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Lint passed\033[0m"
          else
            echo -e "\033[31m✗ Lint failed\033[0m"
            FAILED=1
          fi

          if [ "${{ steps.typecheck.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Typecheck passed\033[0m"
          else
            echo -e "\033[31m✗ Typecheck failed\033[0m"
            FAILED=1
          fi

          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Unit tests passed\033[0m"
          else
            echo -e "\033[31m✗ Unit tests failed\033[0m"
            FAILED=1
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo -e "\033[32m✓ Build passed\033[0m"
          else
            echo -e "\033[31m✗ Build failed\033[0m"
            FAILED=1
          fi

          echo ""

          if [ "$FAILED" = "1" ]; then
            echo -e "\033[31mOne or more validation steps failed.\033[0m"
            exit 1
          else
            echo -e "\033[32mAll validation steps passed.\033[0m"
          fi
