name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Publishing $NAME@$VERSION"

      - name: Check if version already exists on npm
        run: |
          if npm view ${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }} version 2>/dev/null; then
            echo ""
            echo -e "\033[31m✗ Version ${{ steps.version.outputs.version }} already exists on npm.\033[0m"
            echo "Bump the version in package.json before publishing."
            exit 1
          else
            echo -e "\033[32m✓ Version ${{ steps.version.outputs.version }} is available.\033[0m"
          fi

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          URL="https://www.npmjs.com/package/${{ steps.version.outputs.name }}/v/${{ steps.version.outputs.version }}"
          echo ""
          echo "=============================="
          echo "       Publish Summary"
          echo "=============================="
          echo ""
          echo -e "\033[32m✓ Published ${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }}\033[0m"
          echo ""
          echo "$URL"
